<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="studentManagementSystem.css">
</head>
<body>
    <div class="navbar">
        <h2>Student Management system</h2>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Add Student</a></li>
          <li><a href="#">Student List</a></li>
        </ul>
    </div>
    <div class="container">
    <h1>Add Student</h1>
    <p>Fill the details below</p>
    <form action="">
        <input type="text" id="userName" placeholder="Enter Student Name">
        <br>
        <input type="text" id="rollNo" placeholder="Enter Roll No">
        <br>
        <select name="course" id="course">
            <option value="course">Select Course</option>
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="B.Tech">B.Tech</option>
        </select>
        <br>
        <select name="Semester" id="Semester">
            <option value="Semester">Select Semester</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
        </select>
        <br>
        <input type="email" id="emailId" placeholder="Enter email id">
        <br>
        <input type="tel" id="phoneNo" placeholder="Enter phone no">
        <br>
        <button type="button" id="addBtn">Add Student</button>
    </form>
    <h2>Student List</h2>
    <table border="1" id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
       <tbody id="tableBody"></tbody>
    </table>
    </div>
    <script src="studentManagementSystem.js"></script>
</body>
</html>
